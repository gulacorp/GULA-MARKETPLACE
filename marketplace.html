<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GULA - Marketplace Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script src="./images.js"></script>
    <style>
        @font-face {
            font-family: 'Akira Expanded';
            src: url('./Akira Expanded Demo.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Aveline';
            src: url('./AvelineRegular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --gula-orange: #FF5800;
            --gula-orange-dark: #E64A00;
            --bg-dark: #000000;
            --bg-card: #111111;
            --bg-hover: #1a1a1a;
            --accent-white: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: rgba(255, 88, 0, 0.3);
            --border-color-strong: rgba(255, 88, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #000000;
            color: var(--accent-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideHorizontal {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--border-color);
            padding: 0 40px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            box-shadow: 0 8px 32px rgba(255, 88, 0, 0.1);
            overflow: hidden;
        }

        nav::before {
            content: 'GULA G GULA G GULA G GULA G GULA G GULA G GULA G GULA G';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Aveline', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: rgba(255, 88, 0, 0.08);
            white-space: nowrap;
            letter-spacing: 20px;
            animation: slideHorizontal 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        .nav-logo {
            font-family: 'Aveline', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gula-orange);
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-logo:hover {
            transform: scale(1.05);
            text-shadow: 0 0 20px rgba(255, 88, 0, 0.5);
        }

        .nav-center {
            display: flex;
            gap: 40px;
            align-items: center;
            list-style: none;
        }

        .nav-center a {
            font-family: 'Akira Expanded', sans-serif;
            color: var(--accent-white);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            position: relative;
            transition: color 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-center a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gula-orange), #FF7A29);
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px rgba(255, 88, 0, 0.5);
        }

        .nav-center a:hover {
            color: var(--gula-orange);
            text-shadow: 0 0 15px rgba(255, 88, 0, 0.5);
        }

        .nav-center a:hover::after {
            width: 100%;
        }

        .nav-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .search-bar {
            background: rgba(17, 17, 17, 0.6);
            backdrop-filter: blur(10px);
            border: 1.5px solid var(--border-color);
            color: var(--accent-white);
            padding: 10px 15px;
            border-radius: 50px;
            width: 200px;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset 0 0 20px rgba(255, 88, 0, 0.05);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--gula-orange);
            box-shadow: 0 0 20px rgba(255, 88, 0, 0.3), inset 0 0 20px rgba(255, 88, 0, 0.08);
            background: rgba(17, 17, 17, 0.8);
        }

        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 1.5px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 12px 12px;
            width: 200px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 999;
            display: none;
        }

        .search-suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 15px;
            color: var(--accent-white);
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 88, 0, 0.1);
            font-size: 0.9rem;
        }

        .suggestion-item:hover {
            background: rgba(255, 88, 0, 0.1);
            color: var(--gula-orange);
            padding-left: 20px;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .nav-search-wrapper {
            position: relative;
        }

        header {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5px solid rgba(255, 88, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gula-orange);
            font-family: 'Akira Expanded', sans-serif;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 600;
            font-family: 'Akira Expanded', sans-serif;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: var(--gula-orange);
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--gula-orange);
            transition: all 0.3s;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--gula-orange);
            color: #000;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 900;
            animation: fadeInUp 0.3s ease;
        }

        .marketplace-container {
            max-width: 1400px;
            margin: 100px auto 0 auto;
            padding: 3rem 2rem;
        }

        .marketplace-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .marketplace-header h1 {
            font-size: 3.5rem;
            font-family: 'Akira Expanded', sans-serif;
            margin-bottom: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeInUp 0.6s ease-out;
        }

        .marketplace-header .highlight {
            color: var(--gula-orange);
            text-shadow: 0 0 20px rgba(255, 88, 0, 0.3);
        }

        .marketplace-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .highlight {
            color: var(--gula-orange);
            text-shadow: 0 0 20px rgba(255, 88, 0, 0.3);
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease-out;
        }

        .filter-btn {
            padding: 0.8rem 1.8rem;
            background: rgba(255, 88, 0, 0.1);
            border: 2px solid rgba(255, 88, 0, 0.3);
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 50px;
            font-family: 'Akira Expanded', sans-serif;
            font-weight: 900;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--gula-orange);
            color: #000;
            border-color: var(--gula-orange);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 88, 0, 0.3);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
            margin-bottom: 4rem;
        }

        .product-card {
            background: rgba(20, 20, 20, 0.5);
            backdrop-filter: blur(10px);
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            animation: fadeInUp 0.6s ease-out;
            box-shadow: 0 0 30px rgba(255, 88, 0, 0.05), inset 0 0 30px rgba(255, 88, 0, 0.02);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
            z-index: 10;
            pointer-events: none;
        }

        .product-card:hover::before {
            left: 100%;
        }

        .product-card:hover {
            border-color: var(--gula-orange);
            transform: translateY(-20px);
            box-shadow: 0 40px 60px rgba(255, 88, 0, 0.25), inset 0 0 40px rgba(255, 88, 0, 0.08);
            background: rgba(20, 20, 20, 0.7);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, rgba(255, 88, 0, 0.1) 0%, rgba(255, 88, 0, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            font-size: 4rem;
        }

        .product-image::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, rgba(255, 88, 0, 0.1) 0deg, transparent 120deg);
            animation: rotate 10s linear infinite;
            opacity: 0.5;
        }

        .product-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shine 3s infinite;
            z-index: 2;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gula-orange);
            color: var(--bg-dark);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 2;
            letter-spacing: 1px;
        }

        .product-content {
            padding: 25px;
        }

        .product-category {
            color: var(--gula-orange);
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            font-family: 'Akira Expanded', sans-serif;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 0.8rem;
            color: var(--accent-white);
            font-family: 'Aveline', sans-serif;
        }

        .product-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
            font-weight: 300;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }

        .star {
            color: var(--gula-orange);
        }

        .rating-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gula-orange);
            font-family: 'Akira Expanded', sans-serif;
        }

        .add-to-cart-btn {
            background: linear-gradient(135deg, var(--gula-orange) 0%, #FF7A29 100%);
            color: #000;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 900;
            box-shadow: 0 5px 20px rgba(255, 88, 0, 0.2);
        }

        .add-to-cart-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 15px 40px rgba(255, 88, 0, 0.4);
        }

        .add-to-cart-btn:active {
            transform: scale(0.95);
        }

        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: flex-end;
            z-index: 1000;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-content {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(20, 20, 20, 0.9) 100%);
            backdrop-filter: blur(30px);
            width: 100%;
            max-width: 450px;
            height: 100%;
            border-left: 1.5px solid rgba(255, 88, 0, 0.3);
            display: flex;
            flex-direction: column;
            box-shadow: -50px 0 100px rgba(0, 0, 0, 0.7);
            animation: slideInUpCart 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .cart-header {
            padding: 2rem;
            background: linear-gradient(135deg, rgba(255, 88, 0, 0.1) 0%, rgba(255, 88, 0, 0.05) 100%);
            border-bottom: 1.5px solid rgba(255, 88, 0, 0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-family: 'Akira Expanded', sans-serif;
            background: linear-gradient(135deg, var(--gula-orange), #FF7A29);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: 2px solid rgba(255, 88, 0, 0.3);
            color: var(--gula-orange);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-weight: 900;
        }

        .close-btn:hover {
            background: var(--gula-orange);
            color: #000;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .cart-item {
            background: linear-gradient(135deg, rgba(255, 88, 0, 0.08) 0%, rgba(255, 88, 0, 0.03) 100%);
            padding: 1.2rem;
            border-radius: 15px;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            border: 1.5px solid rgba(255, 88, 0, 0.25);
            align-items: center;
        }

        .cart-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h4 {
            margin-bottom: 0.5rem;
            color: var(--accent-white);
            font-size: 0.95rem;
        }

        .cart-item-info p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .cart-item-price {
            font-size: 1.2rem;
            color: var(--gula-orange);
            font-weight: 900;
        }

        .cart-summary {
            background: linear-gradient(135deg, rgba(255, 88, 0, 0.15) 0%, rgba(255, 88, 0, 0.05) 100%);
            border-top: 1.5px solid rgba(255, 88, 0, 0.3);
            border-bottom: 1.5px solid rgba(255, 88, 0, 0.3);
            padding: 1.5rem 2rem;
            margin: auto 1.5rem 1.5rem 1.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .summary-row:last-child {
            border-top: 1px solid rgba(255, 88, 0, 0.2);
            padding-top: 1rem;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--gula-orange);
        }

        .checkout-btn {
            background: linear-gradient(135deg, var(--gula-orange), #FF7A29);
            color: #000;
            border: none;
            padding: 1rem;
            margin: 0 1.5rem 1.5rem 1.5rem;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 2px;
            font-family: 'Akira Expanded', sans-serif;
            box-shadow: 0 5px 20px rgba(255, 88, 0, 0.2);
        }

        .checkout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 88, 0, 0.4);
        }

        .checkout-btn:active {
            transform: translateY(-1px);
        }

        @keyframes slideInUpCart {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            nav {
                padding: 0 20px;
                height: 70px;
            }

            .nav-center {
                gap: 20px;
                display: none;
            }

            .search-bar {
                width: 150px;
                font-size: 0.85rem;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1.5rem;
            }

            .cart-content {
                max-width: 100%;
            }

            .marketplace-header h1 {
                font-size: 2rem;
            }

            header {
                padding: 1rem;
            }

            .marketplace-container {
                padding: 2rem 1rem;
                margin-top: 80px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo" onclick="window.location.href='../gulatemplate.html'">GULA</div>
        <ul class="nav-center">
            <li><a href="../gulatemplate.html#inicio">Inicio</a></li>
            <li><a href="../gulatemplate.html#nosotros">Nosotros</a></li>
            <li><a href="#marketplace">Carta</a></li>
            <li><a href="../gulatemplate.html#testimonios">Reseñas</a></li>
            <li><a href="../gulatemplate.html#contacto">Contacto</a></li>
        </ul>
        <div class="nav-right">
            <div class="nav-search-wrapper">
                <input type="text" class="search-bar" id="searchBar" placeholder="Buscar productos...">
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>
            <div class="cart-icon" onclick="openCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </nav>

    <div class="marketplace-container">
        <div class="marketplace-header">
            <h1>Nuestra <span class="highlight">Carta</span></h1>
            <p>Descubre los mejores sabores de GULA</p>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterProducts('all')">Todos</button>
            <button class="filter-btn" onclick="filterProducts('burgers')">Burgers</button>
            <button class="filter-btn" onclick="filterProducts('sliders')">Sliders</button>
            <button class="filter-btn" onclick="filterProducts('sides')">Sides</button>
            <button class="filter-btn" onclick="filterProducts('postres')">Postres</button>
            <button class="filter-btn" onclick="filterProducts('combos')">Combos</button>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Tu Pedido</h2>
                <button class="close-btn" onclick="closeCart()">✕</button>
            </div>
            <div class="cart-items" id="cartItems">
                <div style="text-align: center; padding: 60px 20px; color: var(--text-secondary);">
                    <div style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"><i class="fas fa-shopping-bag"></i></div>
                    <p style="font-size: 1.1rem; font-weight: 600;">Tu carrito está vacío</p>
                </div>
            </div>
            <div class="cart-summary" id="cartSummary" style="display: none;">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">0.00€</span>
                </div>
                <div class="summary-row">
                    <span>Impuestos (21%)</span>
                    <span id="taxes">0.00€</span>
                </div>
                <div class="summary-row">
                    <span>Total</span>
                    <span id="total">0.00€</span>
                </div>
            </div>
            <button class="checkout-btn" id="checkoutBtn" style="display: none;">Proceder al Pago</button>
        </div>
    </div>

    <script>
        let products = [];
        let cart = [];

        function initializeProducts() {
            products = [
                // Burgers
                { id: 1, title: 'BBK', category: 'burgers', price: 13.90, image: './BURGERS/BBK.png', description: 'Doble smash, queso cheddar, bacon bits', rating: 4.9 },
                { id: 2, title: 'Bohemian Chicken', category: 'burgers', price: 13.90, image: './BURGERS/Bohemian Chicken .png', description: 'Pollo crujiente con salsas premium', rating: 4.8 },
                { id: 3, title: 'Buffalo Ranch (Carne)', category: 'burgers', price: 13.90, image: './BURGERS/Buffalo Ranch.png', description: 'Salsa buffalo con carne premium', rating: 4.7 },
                { id: 4, title: 'Cheese Bacon', category: 'burgers', price: 13.90, image: './BURGERS/Cheesebacon.png', description: 'Queso cheddar y bacon crujiente', rating: 4.8 },
                { id: 5, title: 'Cheeseburger', category: 'burgers', price: 11.90, image: './BURGERS/Cheeseburger.png', description: 'Clásico con queso derretido', rating: 4.6 },
                { id: 6, title: "Pope's", category: 'burgers', price: 12.90, image: './BURGERS/Popes Burger (3).png', description: 'Receta especial premium', rating: 4.7 },
                { id: 7, title: 'Spicy V', category: 'burgers', price: 13.90, image: './BURGERS/Spicy V.png', description: 'Picante y vegetal, muy sabrosa', rating: 4.5 },
                { id: 8, title: 'The Sinner', category: 'burgers', price: 13.90, image: './BURGERS/The Sinner .png', description: 'Pecadosamente deliciosa', rating: 4.9 },
                { id: 9, title: 'The Trufa Corp', category: 'burgers', price: 14.90, image: './BURGERS/The Trufa Corp.png', description: 'Salsa trufada premium', rating: 4.9 },
                { id: 10, title: 'Trufa Corp Chicken', category: 'burgers', price: 13.90, image: './BURGERS/The Trufa Corp Chicken.png', description: 'Pollo con salsa trufada', rating: 4.8 },
                
                // Sliders
                { id: 11, title: 'Golden Slider', category: 'sliders', price: 7.90, image: './SLIDER/Golden Slider.png', description: 'Mini burger premium', rating: 4.7 },
                
                // Sides (Entrantes)
                { id: 12, title: 'Alitas', category: 'sides', price: 8.50, image: './ENTRANTES/Alitas.png', description: 'Alitas de pollo barbacoa crujientes', rating: 4.6 },
                { id: 13, title: 'Fritas Bacon & Queso', category: 'sides', price: 6.50, image: './ENTRANTES/Fritas Cheese Bacon.png', description: 'Patatas con bacon y queso', rating: 4.5 },
                { id: 14, title: 'Fritas Buffalo Ranch', category: 'sides', price: 7.50, image: './ENTRANTES/Fritas Buffalo Ranch.png', description: 'Patatas fritas, salsa buffalo premium', rating: 4.7 },
                { id: 15, title: 'Fritas Trufadas', category: 'sides', price: 6.50, image: './ENTRANTES/Fritas Trufadas.png', description: 'Patatas crujientes con salsa trufa', rating: 4.8 },
                { id: 16, title: 'Nuestras fritas', category: 'sides', price: 3.40, image: './ENTRANTES/Nuestras Fritas.png', description: 'Patatas crujientes al punto de sal', rating: 4.5 },
                { id: 17, title: 'Pollo Frito', category: 'sides', price: 9.90, image: './ENTRANTES/Pollo Frito.png', description: 'Pollo crujiente y jugoso', rating: 4.7 },
                
                // Postres
                { id: 18, title: 'Cheesecake Dinosaurus', category: 'postres', price: 6.50, image: './POSTRES/Cheesecake con Galleta Dinosaurus y Chocolate Blanco.png', description: 'Cheesecake con chocolate blanco', rating: 4.8 },
                { id: 19, title: 'Cheesecake Lotus', category: 'postres', price: 6.50, image: './POSTRES/Cheesecake con Galleta Lotus y Dulce de Leche.png', description: 'Cheesecake con dulce de leche', rating: 4.9 },
                
                // Combos
                { id: 20, title: 'Pleasure for Two', category: 'combos', price: 30.90, image: './COMBOS/Pleasure for 2 combo.png', description: '2 burgers + sides + bebidas + postres', rating: 4.9 },
                { id: 21, title: 'Sin City', category: 'combos', price: 69.00, image: './COMBOS/Sin City Combo.png', description: '4 burgers + entrantes + bebidas + postres', rating: 5.0 },
                { id: 22, title: 'Sinner Combo', category: 'combos', price: 14.90, image: './COMBOS/Sinner Combo.png', description: 'The Sinner + sides + bebida', rating: 4.7 },
                { id: 23, title: 'The Golden Bite', category: 'combos', price: 20.00, image: './COMBOS/Golden Bite copy.png', description: 'Burger premium + entrante + bebida', rating: 4.8 },
            ];
            renderProducts(products);
        }

        function renderProducts(productsToShow = products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = productsToShow.map(product => `
                <div class="product-card" data-category="${product.category}">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.title}" onerror="this.style.display='none'">
                        <span class="product-badge">Premium</span>
                    </div>
                    <div class="product-content">
                        <div class="product-category">${product.category.toUpperCase()}</div>
                        <div class="product-title">${product.title}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-rating">
                            <span class="star">${'⭐'.repeat(Math.floor(product.rating))}</span>
                            <span class="rating-text">${product.rating}</span>
                        </div>
                        <div class="product-footer">
                            <div class="product-price">${product.price.toFixed(2)}€</div>
                            <button class="add-to-cart-btn" onclick="addToCart(${product.id})"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = category === 'all' ? products : products.filter(p => p.category === category);
            renderProducts(filtered);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartCount = document.getElementById('cartCount');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;

            const cartItems = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px; color: var(--text-secondary);">
                        <div style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;">🛍️</div>
                        <p style="font-size: 1.1rem; font-weight: 600;">Tu carrito está vacío</p>
                    </div>
                `;
                document.getElementById('cartSummary').style.display = 'none';
                document.getElementById('checkoutBtn').style.display = 'none';
            } else {
                cartItems.innerHTML = cart.map((item, index) => `
                    <div class="cart-item" style="animation: fadeInUp ${0.3 + index * 0.05}s ease;">
                        <img src="${item.image}" alt="${item.title}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 10px; flex-shrink: 0;" onerror="this.style.display='none'">
                        <div class="cart-item-info">
                            <h4>${item.title}</h4>
                            <p>
                                <span style="background: rgba(255, 88, 0, 0.2); padding: 4px 8px; border-radius: 8px; font-weight: 600;">
                                    x${item.quantity}
                                </span>
                                <span style="margin-left: 10px; opacity: 0.7;">
                                    ${item.price.toFixed(2)}€ c/u
                                </span>
                            </p>
                        </div>
                        <div class="cart-item-price">${(item.price * item.quantity).toFixed(2)}€</div>
                    </div>
                `).join('');
                
                const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const taxes = subtotal * 0.21;
                const total = subtotal + taxes;
                
                document.getElementById('subtotal').textContent = subtotal.toFixed(2) + '€';
                document.getElementById('taxes').textContent = taxes.toFixed(2) + '€';
                document.getElementById('total').textContent = total.toFixed(2) + '€';
                document.getElementById('cartSummary').style.display = 'block';
                document.getElementById('checkoutBtn').style.display = 'block';
            }
        }

        function openCart() {
            document.getElementById('cartModal').classList.add('active');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        function searchProducts(query) {
            const filtered = products.filter(product => 
                product.title.toLowerCase().includes(query.toLowerCase()) ||
                product.description.toLowerCase().includes(query.toLowerCase()) ||
                product.category.toLowerCase().includes(query.toLowerCase())
            );
            renderProducts(filtered);
        }

        function showSuggestions(query) {
            const suggestionsContainer = document.getElementById('searchSuggestions');
            
            if (!query.trim()) {
                suggestionsContainer.classList.remove('active');
                return;
            }

            const suggestions = products.filter(product =>
                product.title.toLowerCase().includes(query.toLowerCase())
            ).slice(0, 6);

            if (suggestions.length === 0) {
                suggestionsContainer.classList.remove('active');
                return;
            }

            suggestionsContainer.innerHTML = suggestions.map(product => `
                <div class="suggestion-item" onclick="selectSuggestion('${product.title}')">
                    ${product.title}
                </div>
            `).join('');

            suggestionsContainer.classList.add('active');
        }

        function selectSuggestion(title) {
            document.getElementById('searchBar').value = title;
            searchProducts(title);
            document.getElementById('searchSuggestions').classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeProducts();
            
            const searchBar = document.getElementById('searchBar');
            if (searchBar) {
                searchBar.addEventListener('input', function(e) {
                    showSuggestions(e.target.value);
                    searchProducts(e.target.value);
                });

                searchBar.addEventListener('blur', function() {
                    setTimeout(() => {
                        document.getElementById('searchSuggestions').classList.remove('active');
                    }, 200);
                });
            }
        });
    </script>
</body>
</html>
